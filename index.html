<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Location Sharing Demo</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: "Segoe UI", sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,#1e1b4b,#312e81);
      padding:20px;
      color:white;
    }

    .card{
      width:100%;
      max-width:420px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:24px;
      padding:30px;
      text-align:center;
      backdrop-filter:blur(10px);
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .emoji{
      font-size:4rem;
      margin-bottom:15px;
      display:block;
    }

    h1{
      margin-bottom:12px;
      font-size:1.8rem;
    }

    p{
      color:#d1d5db;
      line-height:1.6;
      margin-bottom:25px;
    }

    .btn{
      width:100%;
      border:none;
      outline:none;
      cursor:pointer;
      padding:14px;
      border-radius:50px;
      font-size:1rem;
      font-weight:bold;
      color:white;
      background:linear-gradient(135deg,#6366f1,#8b5cf6);
      transition:0.2s;
    }

    .btn:hover{
      transform:scale(1.03);
    }

    .result{
      margin-top:20px;
      text-align:center;
      background:rgba(255,255,255,0.05);
      padding:15px;
      border-radius:15px;
      min-height:60px;
      white-space:pre-wrap;
      line-height:1.6;
      color:#f1f5f9;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-secondary {
      flex: 1;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }
  </style>
</head>

<body>

  <div class="card">

    <span class="emoji">🎁</span>

    <h1>Location Sharing Demo</h1>

    <p>   
      Click the button below to share your current location.
      Your browser will ask for permission first.
    </p>

    <button class="btn" onclick="getLocation()">
      Share My Location
    </button>

    <div class="result" id="result">
      Click the button to share your location
    </div>

    <div class="button-group">
      <button class="btn btn-secondary" onclick="window.location.href='locations.html'">
        📍 View Locations
      </button>
    </div>

  </div>

  <script>

    const result = document.getElementById("result");

    function sendLocation(lat, lng, accuracy){

      const apiUrl = window.location.hostname === 'localhost' 
        ? 'http://localhost:3000/location'
        : `${window.location.origin}/.netlify/functions/location`;

      fetch(apiUrl, {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          lat,
          lng,
          accuracy,
          consent: true
        })

      })

      .then(response => response.json())

      .then(data => {

        console.log(data);

        result.innerHTML =
          "✅ Location saved successfully";

      })

      .catch(error => {

        console.error(error);

        result.innerHTML =
          "❌ Failed to send location to server.";

      });
    }

    function getLocation(){

      if(!navigator.geolocation){

        result.innerHTML =
          "Geolocation is not supported by your browser.";

        return;
      }

      result.innerHTML =
        "Requesting location permission...";

      navigator.geolocation.getCurrentPosition(

        (position) => {

          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const accuracy = position.coords.accuracy;

          sendLocation(lat, lng, accuracy);

        },

        (error) => {

          if(error.code === error.PERMISSION_DENIED){

            result.innerHTML =
              "❌ Permission denied.";

          }

          else if(error.code === error.POSITION_UNAVAILABLE){

            result.innerHTML =
              "❌ Location unavailable.";

          }

          else if(error.code === error.TIMEOUT){

            result.innerHTML =
              "❌ Request timed out.";

          }

          else{

            result.innerHTML =
              "❌ Unable to get location.";

          }

        },

        {
          enableHighAccuracy:true,
          timeout:10000,
          maximumAge:0
        }

      );
    }

  </script>

</body>
</html>
